# Renombra a `30-secrets.yaml` localmente (NO commitear valores reales) o aplícalo con `kubectl` desde tu máquina.
apiVersion: v1
kind: Secret
metadata:
  name: groupsapp-secrets
  namespace: groupsapp
type: Opaque
stringData:
  # Misma clave en todos los servicios que validan JWT
  jwt.secret: "CHANGE-ME-VERY-LONG-SECRET"

  # RDS (mismo usuario para todas las DBs, distinto database por servicio vía env)
  db.username: "postgres"
  db.password: "CHANGE-ME"

  # ElastiCache Redis
  # Formato: redis://:<password>@<elasticache-endpoint>:6379
  redis.url: "redis://:CHANGE-ME@CHANGE-ME.cache.amazonaws.com:6379"

  # Opcional (media-service a S3). Si queda vacío, el servicio puede operar en modo “local” según su lógica.
  aws.accessKeyId: ""
  aws.secretAccessKey: ""
  # Si usas credenciales temporales de AWS Academy/Lab, incluye session token.
  aws.sessionToken: ""
  s3.bucket: ""
