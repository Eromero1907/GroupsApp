# Edge interno: Nginx como reverse proxy + un solo NLB creado por el cloud-controller (Service type=LoadBalancer)
# Requisitos:
# - NO necesita AWS Load Balancer Controller
# - Crea un Network Load Balancer (NLB) en subredes públicas (reemplaza las subnets)
#
# Ajusta:
# - service.metadata.annotations: subnets (2+ AZ)
# - client_max_body_size: si quieres subir archivos grandes
apiVersion: v1
kind: ConfigMap
metadata:
  name: groupsapp-edge-nginx-conf
  namespace: groupsapp
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
    }

    server {
      listen 80;

      client_max_body_size 100m;

      location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
      }

      # API Gateway (HTTP + rutas bajo /)
      location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_pass http://api-gateway.groupsapp.svc.cluster.local:3000;
      }

      # Engine.IO / Socket.IO (debe ir al presence-service:3006)
      location /socket.io/ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_pass http://presence-service.groupsapp.svc.cluster.local:3006;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: groupsapp-edge-nginx
  namespace: groupsapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: groupsapp-edge-nginx
  template:
    metadata:
      labels:
        app: groupsapp-edge-nginx
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [groupsapp-edge-nginx]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: nginx
          image: public.ecr.aws/nginx/nginx:1.25-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet: { path: /health, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: nginx-config
          configMap:
            name: groupsapp-edge-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: groupsapp-edge
  namespace: groupsapp
  annotations:
    # Crea un NLB (L4). Ajusta subnets a tus subredes públicas (2+ AZ).
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-subnets: subnet-09b0c8c5a858ec16e,subnet-0dac6680c628db381
spec:
  type: LoadBalancer
  selector:
    app: groupsapp-edge-nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
