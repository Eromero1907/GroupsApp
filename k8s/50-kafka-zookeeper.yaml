# Kafka en KRaft (3 brokers) + replicación de topics (RF=3) + volúmenes persistentes.
# Tras un despliegue previo con 1 solo broker, elimina el Deployment `kafka` antiguo
# y aplica de nuevo: kubectl -n groupsapp delete deploy/kafka --ignore-not-found
#
# El Zookeeper se eliminó: KRaft no lo usa. No despliegues cp-zookeeper.
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: groupsapp
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: groupsapp
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [kafka]
                topologyKey: kubernetes.io/hostname
      volumes:
        - name: data
          emptyDir: {}
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              ORD=${HOSTNAME##*-}
              export KAFKA_NODE_ID=$((10#${ORD} + 1))
              export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://kafka-${ORD}.kafka-headless.groupsapp.svc.cluster.local:9092"
              export KAFKA_CONTROLLER_QUORUM_VOTERS="1@kafka-0.kafka-headless.groupsapp.svc.cluster.local:9093,2@kafka-1.kafka-headless.groupsapp.svc.cluster.local:9093,3@kafka-2.kafka-headless.groupsapp.svc.cluster.local:9093"
              exec /etc/kafka/docker/run
          env:
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_CLUSTER_ID, value: "MkU3OEVBNTcwNTJENDM2Qk" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "3" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "3" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "2" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
            - { name: KAFKA_NUM_PARTITIONS, value: "3" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
          ports:
            - { containerPort: 9092, name: plaintext }
            - { containerPort: 9093, name: controller }
          volumeMounts:
            - { name: data, mountPath: /var/lib/kafka/data }
          resources:
            requests: { cpu: "200m", memory: "768Mi" }
            limits: { memory: "2Gi" }
          readinessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
