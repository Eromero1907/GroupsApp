apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: groupsapp
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [auth-service]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: auth-service
          image: 531032605956.dkr.ecr.us-east-1.amazonaws.com/groupsapp/auth-service:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 3001 }]
          env:
            - { name: NODE_ENV, value: "development" }
            - { name: PORT, value: "3001" }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: groupsapp-secrets, key: jwt.secret } }
            - { name: KAFKA_BROKER, valueFrom: { configMapKeyRef: { name: groupsapp-config, key: kafka.broker } } }
            - { name: DB_HOST, valueFrom: { configMapKeyRef: { name: groupsapp-config, key: rds.host } } }
            - { name: DB_PORT, value: "5432" }
            - { name: DB_SSL, valueFrom: { configMapKeyRef: { name: groupsapp-config, key: db.ssl } } }
            - name: DB_USERNAME
              valueFrom: { secretKeyRef: { name: groupsapp-secrets, key: db.username } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: groupsapp-secrets, key: db.password } }
            - { name: DB_NAME, value: "auth_db" }
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: groupsapp
spec:
  type: ClusterIP
  selector: { app: auth-service }
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
